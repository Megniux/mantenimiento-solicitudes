<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
<style>
body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.header {
    background: #1f3a5f;
    padding: 15px 30px;
}

.header-content {
    display: flex;
    align-items: center;
}

.logo {
    height: 90px;
}
    
.header h1 {
    color: white;
    font-size: 28px;
    margin: 0;
    flex: 1;
    text-align: center;
}

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

textarea {
    resize: none;
    height: 80px;
}

.volver-btn {
    width: 100%;
    background: #6c757d;
    padding: 8px 15px;
    border-radius: 5px;
    font-size: 16px;
}

.volver-btn:hover {
    background: #5a6268;
}

.logout-btn {
    margin-left: auto;
}

button {
    padding: 20px 40px;
    background: #1f3a5f;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #16314f;
}

.footer {
    background: #2c4a73;
    color: white;
    padding: 15px 30px;
}

.footer-content {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.phone-icon {
    color: white;
    font-size: 18px;
}

/* TARJETA */
.form-card {
    width: 100%;
}

/* SECCIONES */
.form-section {
    margin-bottom: 20px;
}

.form-section h3 {
    font-size: 16px;
    margin-bottom: 10px;
    color: #1f3a5f;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
}

/* INPUTS CON ICONO */

.icon-input i {
    color: #1f3a5f;
}

.input-with-icon {
    display: flex;
    align-items: center;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 0 10px;
    background: white;
}

.input-with-icon i {
    color: #1f3a5f;
    margin-right: 8px;
}

.input-with-icon input,
.input-with-icon select {
    border: none;
    outline: none;
    padding: 10px 0;
    width: 100%;
    font-size: 14px;
}

/* TEXTAREA */
textarea {
    height: 100px;
}

/* BOTÓN PRINCIPAL */
.btn-primary {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    background: #1f3a5f;
    border-radius: 8px;
}

.btn-primary i {
    margin-right: 8px;
}

</style>
</head>

<body>

<div class="header">
    <div class="header-content">
        <img src="logo.jpg" class="logo">
        <h1>Sistema de Mantenimiento</h1>
        <button class="logout-btn" onclick="logout()">
            Cerrar sesión
        </button>
    </div> 
</div>

<div style="padding: 15px;">
    <button class="volver-btn" onclick="location.href='index.html'">
        ← Volver al menú
    </button>
</div>
    
<div class="container">
    <div class="form-card">

        <h2><i class="fa-solid fa-file-circle-plus"></i> Solicitud de Mantenimiento</h2>

        <div class="form-section">
            <h3>Datos generales</h3>

            <div class="form-group">
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="solicitante" placeholder="Solicitante">
                </div>
            </div>

            <div class="form-group icon-input">
                <i class="fa-solid fa-list"></i>
                <select id="tipo" onchange="mostrarFrecuencia()">
                    <option value="Correctivo">Correctivo</option>
                    <option value="Preventivo">Preventivo</option>
                </select>
            </div>

            <div class="form-group icon-input" id="grupoFrecuencia" style="display:none;">
                <i class="fa-solid fa-repeat"></i>
                <input type="text" id="frecuencia" placeholder="Frecuencia (ej: mensual)">
            </div>
        </div>

        <div class="form-section">
            <h3>Ubicación y equipo</h3>

            <div class="form-group icon-input">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" id="ubicacion" placeholder="Locación">
            </div>

            <div class="form-group icon-input">
                <i class="fa-solid fa-gears"></i>
                <input type="text" id="equipo" placeholder="Equipo">
            </div>
        </div>

        <div class="form-section">
            <h3>Detalle</h3>

            <div class="form-group">
                <textarea id="descripcion" placeholder="Descripción del problema o tarea"></textarea>
            </div>

            <div class="form-group icon-input">
                <i class="fa-solid fa-flag"></i>
                <select id="prioridad">
                    <option>Baja</option>
                    <option selected>Media</option>
                    <option>Alta</option>
                </select>
            </div>
        </div>

        <button onclick="guardar()" class="btn-primary">
            <i class="fa-solid fa-paper-plane"></i> Enviar solicitud
        </button>

    </div>
</div>

<div class="footer">
    <div class="footer-content">
        <i class="fa-solid fa-phone phone-icon"></i>
        <span>+54 9 11 2765 6821</span>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

// FIRESTORE (datos)
import { getFirestore, collection, addDoc, doc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// AUTH (login)
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    
// CONFIG FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
    authDomain: "mantenimiento-app-170e5.firebaseapp.com",
    projectId: "mantenimiento-app-170e5",
    storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
    messagingSenderId: "555398253444",
    appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// MOSTRAR / OCULTAR FRECUENCIA
window.mostrarFrecuencia = function () {
    const tipo = document.getElementById("tipo").value;
    const grupo = document.getElementById("grupoFrecuencia");

    grupo.style.display = (tipo === "Preventivo") ? "block" : "none";
}

// GENERAR NUMERO
async function generarNumero(tipo) {
    const ref = doc(db, "config", "contador");
    const snap = await getDoc(ref);
    let data = snap.data();

    let numero;

    if (tipo === "Correctivo") {
        numero = "OMC-" + String(data.contadorOMC).padStart(4, "0");
        await updateDoc(ref, { contadorOMC: data.contadorOMC + 1 });
    } else {
        numero = "OMP-" + String(data.contadorOMP).padStart(4, "0");
        await updateDoc(ref, { contadorOMP: data.contadorOMP + 1 });
    }

    return numero;
}

// GUARDAR
window.guardar = async function () {

    const solicitante = document.getElementById("solicitante").value;
    const tipo = document.getElementById("tipo").value;
    const ubicacion = document.getElementById("ubicacion").value;
    const equipo = document.getElementById("equipo").value;
    const descripcion = document.getElementById("descripcion").value;
    const prioridad = document.getElementById("prioridad").value;
    const frecuencia = document.getElementById("frecuencia").value;

    try {

        const numeroOrden = await generarNumero(tipo);

        await addDoc(collection(db, "ordenes"), {
            numeroOrden,
            tipo,
            estado: "Nuevo",

            fechaCreacion: new Date(),
            fechaProgramada: null,
            fechaCierre: null,

            solicitante,
            ubicacion,
            equipo,
            descripcion,
            prioridad,

            frecuencia: tipo === "Preventivo" ? frecuencia : "",

            respuestaMantenimiento: "",
            proveedor: "",
            tiempoEstimado: "",
            tecnicoAsignado: "",

            historial: [
                {
                    estado: "Nuevo",
                    fecha: new Date(),
                    usuario: solicitante
                }
            ]
        });

        alert("Orden creada: " + numeroOrden);

        location.reload();

    } catch (e) {
        console.error(e);
        alert("Error al guardar");
    }
}

// PROTECCIÓN
const auth = getAuth();

onAuthStateChanged(auth, (user) => {
    if (user === null) {
        // Espera real: Firebase ya resolvió estado
        window.location.href = "login.html";
    }
});

//LOGOUT
window.logout = async function() {
    await signOut(auth);
    window.location.href = "login.html";
}
    
</script>
    
</body>
</html>
