<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitud de Mantenimiento</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    margin: 0;
}

.header {
    background: #1f3a5f;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

textarea {
    resize: none;
    height: 80px;
}

button {
    width: 100%;
    padding: 12px;
    background: #1f3a5f;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #16314f;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.jpg" style="height:70px; display:block; margin:auto;">
    <h1 style="text-align:center; color:white;">Sistema de Mantenimiento</h1>
</div>

<div class="container">
    <h2>Solicitud de Mantenimiento</h2>

    <div class="form-group">
        <label>Solicitante</label>
        <input type="text" id="solicitante">
    </div>

    <div class="form-group">
        <label>Tipo de solicitud</label>
        <select id="tipo" onchange="mostrarFrecuencia()">
            <option value="Correctivo">Correctivo</option>
            <option value="Preventivo">Preventivo</option>
        </select>
    </div>

    <div class="form-group" id="grupoFrecuencia" style="display:none;">
        <label>Frecuencia</label>
        <input type="text" id="frecuencia" placeholder="Ej: mensual, semanal">
    </div>

    <div class="form-group">
        <label>Locación</label>
        <input type="text" id="ubicacion">
    </div>

    <div class="form-group">
        <label>Equipo</label>
        <input type="text" id="equipo">
    </div>

    <div class="form-group">
        <label>Descripción</label>
        <textarea id="descripcion"></textarea>
    </div>

    <div class="form-group">
        <label>Prioridad</label>
        <select id="prioridad">
            <option>Baja</option>
            <option selected>Media</option>
            <option>Alta</option>
        </select>
    </div>

    <button onclick="guardar()">Enviar solicitud</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
    authDomain: "mantenimiento-app-170e5.firebaseapp.com",
    projectId: "mantenimiento-app-170e5",
    storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
    messagingSenderId: "555398253444",
    appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// MOSTRAR / OCULTAR FRECUENCIA
window.mostrarFrecuencia = function () {
    const tipo = document.getElementById("tipo").value;
    const grupo = document.getElementById("grupoFrecuencia");

    grupo.style.display = (tipo === "Preventivo") ? "block" : "none";
}

// GENERAR NUMERO
async function generarNumero(tipo) {
    const ref = doc(db, "config", "contador");
    const snap = await getDoc(ref);
    let data = snap.data();

    let numero;

    if (tipo === "Correctivo") {
        numero = "OMC-" + String(data.contadorOMC).padStart(4, "0");
        await updateDoc(ref, { contadorOMC: data.contadorOMC + 1 });
    } else {
        numero = "OMP-" + String(data.contadorOMP).padStart(4, "0");
        await updateDoc(ref, { contadorOMP: data.contadorOMP + 1 });
    }

    return numero;
}

// GUARDAR
window.guardar = async function () {

    const solicitante = document.getElementById("solicitante").value;
    const tipo = document.getElementById("tipo").value;
    const ubicacion = document.getElementById("ubicacion").value;
    const equipo = document.getElementById("equipo").value;
    const descripcion = document.getElementById("descripcion").value;
    const prioridad = document.getElementById("prioridad").value;
    const frecuencia = document.getElementById("frecuencia").value;

    try {

        const numeroOrden = await generarNumero(tipo);

        await addDoc(collection(db, "ordenes"), {
            numeroOrden,
            tipo,
            estado: "Nuevo",

            fechaCreacion: new Date(),
            fechaProgramada: null,
            fechaCierre: null,

            solicitante,
            ubicacion,
            equipo,
            descripcion,
            prioridad,

            frecuencia: tipo === "Preventivo" ? frecuencia : "",

            respuestaMantenimiento: "",
            proveedor: "",
            tiempoEstimado: "",
            tecnicoAsignado: "",

            historial: [
                {
                    estado: "Nuevo",
                    fecha: new Date(),
                    usuario: solicitante
                }
            ]
        });

        alert("Orden creada: " + numeroOrden);

        location.reload();

    } catch (e) {
        console.error(e);
        alert("Error al guardar");
    }
}
</script>

</body>
</html>
