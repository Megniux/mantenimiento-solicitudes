<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Mantenimiento</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
<style>
body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.header {
    background: #1f3a5f;
    padding: 15px 30px;
}

.header-content {
    display: flex;
    align-items: center;
}

.logo {
    height: 90px;
}
    
.header h1 {
    color: white;
    font-size: 28px;
    margin: 0;
    flex: 1;
    text-align: center;
}

.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
}

.logout-btn {
    margin-left: auto;
}

button {
    padding: 20px 40px;
    font-size: 18px;
    background: #1f3a5f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16314f;
}

.footer {
    background: #2c4a73;
    color: white;
    padding: 15px 30px;
}

.footer-content {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.phone-icon {
    color: white;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="header">
    <div class="header-content">
        <img src="logo.jpg" class="logo">
        <h1>Sistema de Mantenimiento</h1>
        <button class="logout-btn" onclick="logout()">
            Cerrar sesión
        </button>
    </div> 
</div>

<div class="container">
    <button onclick="location.href='solicitud.html'">
        Nueva Solicitud
    </button>

    <button onclick="location.href='consulta.html'">
        Ver Solicitudes
    </button>
</div>

<div class="footer">
    <div class="footer-content">
        <i class="fa-solid fa-phone phone-icon"></i>
        <span>+54 9 11 2765 6821</span>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
    authDomain: "mantenimiento-app-170e5.firebaseapp.com",
    projectId: "mantenimiento-app-170e5",
    storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
    messagingSenderId: "555398253444",
    appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// PROTECCIÓN
onAuthStateChanged(auth, (user) => {
    if (user === null) {
        // Espera real: Firebase ya resolvió estado
        window.location.href = "login.html";
    }
});

//LOGOUT
window.logout = async function() {
    await signOut(auth);
    window.location.href = "login.html";
}
    
</script>
    
</body>
</html>
