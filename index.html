<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitud de Mantenimiento</title>

<style>
body {
    font-family: Arial;
    background-color: #f2f2f2;
    padding: 40px;
}
.container {
    background: white;
    padding: 20px;
    max-width: 500px;
    margin: auto;
    border-radius: 10px;
}
input, textarea, select, button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}
button {
    background-color: #28a745;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Solicitud de Mantenimiento</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="equipo" placeholder="Equipo">
    
    <select id="tipo">
        <option>Correctivo</option>
        <option>Preventivo</option>
    </select>

    <textarea id="descripcion" placeholder="Descripción"></textarea>

    <button onclick="guardar()">Enviar</button>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
    authDomain: "mantenimiento-app-170e5.firebaseapp.com",
    projectId: "mantenimiento-app-170e5",
    storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
    messagingSenderId: "555398253444",
    appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


async function generarNumero(tipo) {
    const ref = doc(db, "config", "contador");
    const snap = await getDoc(ref);

    let data = snap.data();

    let numero;

    if (tipo === "Correctivo") {
        numero = "OMC-" + String(data.contadorOMC).padStart(4, "0");
        await updateDoc(ref, { contadorOMC: data.contadorOMC + 1 });
    } else {
        numero = "OMP-" + String(data.contadorOMP).padStart(4, "0");
        await updateDoc(ref, { contadorOMP: data.contadorOMP + 1 });
    }

    return numero;
}


window.guardar = async function () {

    const nombre = document.getElementById("nombre").value;
    const equipo = document.getElementById("equipo").value;
    const tipo = document.getElementById("tipo").value;
    const descripcion = document.getElementById("descripcion").value;

    try {

        const numeroOrden = await generarNumero(tipo);

        await addDoc(collection(db, "ordenes"), {
            numeroOrden,
            tipo,
            estado: "Nuevo",

            fechaCreacion: new Date(),
            fechaProgramada: null,
            fechaCierre: null,

            solicitante: nombre,
            email: "",

            equipo,
            ubicacion: "",
            descripcion,

            prioridad: "Media",

            respuestaMantenimiento: "",
            proveedor: "",
            tiempoEstimado: "",
            tecnicoAsignado: "",

            historial: [
                {
                    estado: "Nuevo",
                    fecha: new Date(),
                    usuario: nombre
                }
            ]
        });

        alert("Orden creada: " + numeroOrden);

    } catch (e) {
        console.error(e);
        alert("Error al guardar");
    }
}

</script>

</body>
</html>
