<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Mantenimiento</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    margin: 0;
}

.header {
    background: #1f3a5f;
    padding: 15px 30px;
}

.header-content {
    display: flex;
    align-items: center;
}

.logo {
    height: 100px;
    margin-right: 30px;
}
    
.header h1 {
    color: white;
    font-size: 28px;
    margin: 0;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 140px);
    gap: 30px;
}

button {
    padding: 20px 40px;
    font-size: 18px;
    background: #1f3a5f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16314f;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-content">
        <img src="logo.jpg" class="logo">
        <h1>Sistema de Mantenimiento</h1>
        <button onclick="logout()" style="position:absolute; right:20px;">
            Cerrar sesión
        </button>
    </div> 
</div>

<div class="container">
    <button onclick="location.href='solicitud.html'">
        Nueva Solicitud
    </button>

    <button onclick="location.href='consulta.html'">
        Ver Solicitudes
    </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
    authDomain: "mantenimiento-app-170e5.firebaseapp.com",
    projectId: "mantenimiento-app-170e5",
    storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
    messagingSenderId: "555398253444",
    appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// PROTECCIÓN
onAuthStateChanged(auth, (user) => {
    if (user === null) {
        // Espera real: Firebase ya resolvió estado
        window.location.href = "login.html";
    }
});

//LOGOUT
window.logout = async function() {
    await signOut(auth);
    window.location.href = "login.html";
}
    
</script>
    
</body>
</html>
