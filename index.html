<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Mantenimiento</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    margin: 0;
}

.header {
    background: #1f3a5f;
    color: white;
    text-align: center;
    padding: 25px;
}

.header img {
    height: 80px;
    display: block;
    margin: auto;
    margin-bottom: 10px;
}

.header h1 {
    margin: 0;
    font-size: 28px;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 140px);
    gap: 30px;
}

button {
    padding: 20px 40px;
    font-size: 18px;
    background: #1f3a5f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16314f;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.jpg" alt="Logo">
    <h1>Sistema de Mantenimiento</h1>
</div>

<div class="container">
    <button onclick="location.href='solicitud.html'">
        Nueva Solicitud
    </button>

    <button onclick="location.href='consulta.html'">
        Ver Solicitudes
    </button>
</div>

</body>
</html>
