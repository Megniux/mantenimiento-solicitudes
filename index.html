<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Mantenimiento</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    margin: 0;
}

.header {
    background: #1f3a5f;
    padding: 15px 30px;
}

.header-content {
    display: flex;
    align-items: center;
}

.logo {
    height: 70px;
    margin-right: 20px;
}

.header h1 {
    color: white;
    font-size: 32px;
    margin: 0;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 140px);
    gap: 30px;
}

button {
    padding: 20px 40px;
    font-size: 18px;
    background: #1f3a5f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16314f;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-content">
        <img src="logo.jpg" class="logo">
        <h1>Sistema de Mantenimiento</h1>
    </div>
</div>

<div class="container">
    <button onclick="location.href='solicitud.html'">
        Nueva Solicitud
    </button>

    <button onclick="location.href='consulta.html'">
        Ver Solicitudes
    </button>
</div>

</body>
</html>
