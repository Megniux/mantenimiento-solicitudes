<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Mantenimiento</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
        }
        input, textarea, select, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Solicitud de Mantenimiento</h2>

    <input type="text" placeholder="Nombre" id="nombre">
    <input type="text" placeholder="Equipo" id="equipo">
    
    <select id="tipo">
        <option>Correctivo</option>
        <option>Preventivo</option>
    </select>

    <textarea placeholder="Descripción del problema" id="descripcion"></textarea>

    <button onclick="enviar()">Enviar</button>
</div>

<script>
function enviar() {
    alert("Solicitud enviada (modo prueba)");
}
</script>

</body>
</html>
