<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta de Órdenes</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 20px;
}

h2 {
    text-align: center;
}

.header {
    background: #1f3a5f;
    padding: 15px 30px;
}

.header-content {
    display: flex;
    align-items: center;
}

.logo {
    height: 70px;
    margin-right: 20px;
}

.header h1 {
    color: white;
    font-size: 32px;
    margin: 0;
}

.filtros {
    max-width: 800px;
    margin: auto;
    margin-bottom: 20px;
}

.volver-btn {
    background: #6c757d;
    color: white;
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.volver-btn:hover {
    background: #5a6268;
}

input, select {
    padding: 10px;
    margin: 5px;
}

table {
    width: 100%;
    background: white;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
}

th {
    background: #007BFF;
    color: white;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-content">
        <img src="logo.jpg" class="logo">
        <h1>Sistema de Mantenimiento</h1>
    </div>
</div>

<div style="padding: 15px;">
    <button class="volver-btn" onclick="location.href='index.html'">
        ← Volver al menú
    </button>
</div>
    
<h2>Consulta de Órdenes</h2>

<div class="filtros">
    <input type="text" id="busqueda" placeholder="Buscar por número">
    
    <select id="estadoFiltro">
        <option value="">Todos</option>
        <option>Nuevo</option>
        <option>Pendiente</option>
        <option>En proceso</option>
        <option>Esperando proveedor</option>
        <option>Cerrado</option>
    </select>

    <button onclick="cargar()">Filtrar</button>
</div>

<table>
    <thead>
        <tr>
            <th>N° Orden</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Equipo</th>
            <th>Descripción</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// TU CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyDew-CFyPQ8fIUPQf_vnInM9-JZEuV1zi8",
    authDomain: "mantenimiento-app-170e5.firebaseapp.com",
    projectId: "mantenimiento-app-170e5",
    storageBucket: "mantenimiento-app-170e5.firebasestorage.app",
    messagingSenderId: "555398253444",
    appId: "1:555398253444:web:565d98dbbe52844b5bebd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.cargar = async function () {

    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    const busqueda = document.getElementById("busqueda").value.toLowerCase();
    const estadoFiltro = document.getElementById("estadoFiltro").value;

    const querySnapshot = await getDocs(collection(db, "ordenes"));

    querySnapshot.forEach((doc) => {
        const data = doc.data();

        // FILTROS
        if (busqueda && !data.numeroOrden.toLowerCase().includes(busqueda)) return;
        if (estadoFiltro && data.estado !== estadoFiltro) return;

        const fila = `
            <tr>
                <td>${data.numeroOrden}</td>
                <td>${data.tipo}</td>
                <td>${data.estado}</td>
                <td>${data.equipo}</td>
                <td>${data.descripcion}</td>
            </tr>
        `;

        tabla.innerHTML += fila;
    });
}

// Carga inicial
cargar();

</script>

</body>
</html>
